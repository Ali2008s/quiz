workflows:
  android_shorebird_patch:
    name: Build Android Shorebird Patch
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Shorebird patch android
        script: |
          # Install Shorebird
          curl -proto '=https' -tlsv1.2 -sSf https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          export PATH="$PATH:$HOME/.shorebird/bin"
          
          # Run Patch
          shorebird patch android --no-codesign --force
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

  ios_shorebird_patch:
    name: Build iOS Shorebird Patch (No Codesign)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Shorebird patch ios
        script: |
          # Install Shorebird
          curl -proto '=https' -tlsv1.2 -sSf https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          export PATH="$PATH:$HOME/.shorebird/bin"
          
          # Run Patch
          shorebird patch ios --no-codesign --force
    artifacts:
      - build/ios/iphoneos/Runner.app
